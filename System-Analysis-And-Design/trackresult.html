<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Request | Barangay Tugtug E-System</title>
    <link rel="icon" href="photos/logo.png.png"/>
    <link rel="stylesheet" href="cssfile/trackresult.css"/>
</head>
<body>

    <button class="btn-back" onclick="history.back()">
        <image class="backbutton" src="photos/backbutton.png"></image>
        <label class="back">Back</label>
    </button>

    <div class="track-container">

        <!-- Search Section -->
        <div class="search-section">
            <div class="search-header">
                <img class="track-logo" src="photos/logo.png.png" alt="Barangay Logo"/>
                <div>
                    <h1 class="track-title">Track Your Request</h1>
                    <p class="track-sub">Enter your reference number to check the status of your request</p>
                </div>
            </div>

            <div class="search-box">
                <input type="text" id="ref-input" class="ref-input"
                    placeholder="e.g. BRGY-2026-1234 or DOC-2026-1234"
                    autocomplete="off"/>
                <button class="search-btn" onclick="trackRequest()">🔍 Track</button>
            </div>
            <p class="format-hint">
                Blotter format: <strong>BRGY-YEAR-XXXX</strong> &nbsp;|&nbsp;
                Document format: <strong>DOC-YEAR-XXXX</strong>
            </p>
        </div>

        <!-- Result Section (hidden until search) -->
        <div class="result-section" id="result-section" style="display:none;">

            <!-- Loading -->
            <div id="result-loading" style="display:none; text-align:center; padding:3vh 0; color:#375309; font-size:1.8vh;">
                <span class="spinner"></span> Looking up your request…
            </div>

            <!-- Error -->
            <div id="result-error" style="display:none;">
                <div class="error-box">
                    <span style="font-size:3vh;">❌</span>
                    <p id="error-message">Reference number not found.</p>
                </div>
            </div>

            <!-- Success Card -->
            <div id="result-card" style="display:none;">

                <div class="result-type-badge" id="result-type-badge"></div>

                <div class="result-ref-box">
                    <span class="ref-label-sm">REFERENCE NUMBER</span>
                    <h2 class="result-ref-num" id="result-ref-num">—</h2>
                </div>

                <!-- Status Banner -->
                <div class="status-banner" id="status-banner">
                    <span class="status-label">STATUS</span>
                    <span class="status-value" id="status-value">—</span>
                </div>

                <!-- Price Banner -->
                <div class="price-banner">
                    <span class="price-label">AMOUNT TO PAY</span>
                    <span class="price-value" id="price-value">—</span>
                </div>

                <!-- Details -->
                <div class="detail-grid" id="detail-grid"></div>

                <!-- Progress Steps -->
                <div class="progress-section">
                    <h4 class="progress-title">REQUEST PROGRESS</h4>
                    <div class="progress-steps" id="progress-steps"></div>
                </div>

            </div>

        </div>

    </div>

    <script src="Javascript/trackresult.js"></script>
</body>
</html>
