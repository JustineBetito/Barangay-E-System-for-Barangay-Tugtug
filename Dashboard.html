<!DOCTYPE html>

<html>
    <head>
        <title>Home | Barangay Tugtug E-System</title>
        <script src='Dashboard.js'></script>
        <link rel="stylesheet" href="cssfile/Dashboard.css"/>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <link rel="icon" href="photos/logo.png.png"/>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">

    </head>


    <body>

        <nav class="sidebar-container">

            <div class="Logo-container" >

                <image class="Logo" src="photos/logo.png.png" alt="Error to Load Image"></image>
                <h2 class="E-System">Barangay E-System</h2>

            <div class="home-container">
                <button class="Home" type="submit"><image class="picture-home" src="photos/home.png"></image></button>
                <h3 class="Home-word">Home</h3>

            </div>
            
                
            <div class="document-container" onclick="window.location.href='Documentrequest.html'">

                <button class="Document" type="submit" onclick="window.location.href='Documentrequest.html'"><image class="picture-document" src="photos/Document.png"></image></button>
                <h3 class="Document-word">Document Requests</h3>

            </div>


            <div class="blotter-container" onclick="window.location.href='Blotter.html'">

                <button class="Blotter" type="submit" onclick="window.location.href='Blotter.html'"><image class="picture-blotter" src="photos/Blotter.png"></image></button>
                <h3 class="Blotter-word">Blotter Dashboard</h3>
            </div>


            <div>

                <button class="Profile" type="submit"><image class="picture-profile" src="photos/ProfilePicture.png"></image></button>
                <hr class="sidebar-divider">
                <button class="Logout" type="submit" onclick="window.location.href='Login.html'"><image class="picture-logout" src="photos/Logout.png"></image></button>

            </div>

            </div>

        </nav>


        <nav class="upbar-container">

            <h1 class="home-title">Home</h1>
            
            

        </nav>
        

        <section class="calendar-wrapper">

            <div class="calendar-header">

                <button id="prevMonth">Previous</button>
                <h2 id="monthYearText">Month Year</h2>
                <button id="nextMonth">Next</button>

            </div>

            <div class="calendar-grid">

                <div class="day-name">Sun</div><div class="day-name">Mon</div>
                <div class="day-name">Tue</div><div class="day-name">Wed</div>
                <div class="day-name">Thu</div><div class="day-name">Fri</div>
                <div class="day-name">Sat</div>
                <div id="calendarDates" class="dates-container"></div>

            </div>

        </section>

        





        




    </body>

</html>
