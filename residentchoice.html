<!DOCTYPE html>

<html>


    <head>

        <title>Resident Tab | Barangay Tugtug E-System</title>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <link rel="stylesheet" href="cssfile/residentchoice.css"/>
        <link rel="icon" href="photos/logo.png.png"/>

    </head>


    <body>

        <button class="btn-back" onclick="window.location.href='choice.html'">
            
            <image class="backbutton" src="photos/backbutton.png"></image>
            <label class="back">Back</label>


        </button>

        <label>Please Select Your Request</label>

        <header class="Container">

            <section class="blotter-Container" input button="submit" onclick="window.location.href='residentform2.html'">

                <image class="blotter-Logo" src="photos/Blotter.png" alt="Error to Load Image"></image>
                <h1 id="blotter">Blotter Request</h1>

            </section>


            <section class="document-Container" input button="submit" onclick="window.location.href='residentform.html'">

                <image class="document-Logo" src="photos/Document.png" alt="Error to Load Image"></image>
                <h1 id="document">Document Request</h1>

          
            </section>


        </header>

        <section class="tracking">

            <section class="track-blotter">

                <label class="blotter-track"> Track your Blotter Request</label>
                <label class="blot-ref">Reference Number</label>
                <input class="blot-number" type="number" step="none" placeholder="Ref Number"/>



            </section>

            
            <section class="track-document">

                <label class="document-track"> Track your Document Request</label>
                <label class="docu-ref">Reference Number</label>
                <input class="docu-number" type="number" placeholder="Ref Number"/>

                
            </section>


        </section>









        
    </body>

</html>
