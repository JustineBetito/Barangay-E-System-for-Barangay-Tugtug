<!DOCTYPE html>

<html>
    <head>
        <title>Blotter | Barangay Tugtug E-System</title>
        <link rel="stylesheet" href="cssfile/Blotter.css"/>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <link rel="icon" href="photos/logo.png.png"/>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    </head>


    <body>

        <nav class="sidebar-container">

            <div class="Logo-container" >

                <image class="Logo" src="photos/logo.png.png" alt="Error to Load Image"></image>
                <h2 class="E-System">Barangay E-System</h2>

            <div class="home-container" onclick="window.location.href='Dashboard.html'">
                <button class="Home" type="submit" onclick="window.location.href='Dashboard.html'"><image class="picture-home" src="photos/home.png"></image></button>
                <h3 class="Home-word">Home</h3>

            </div>
            
                
            <div class="document-container" onclick="window.location.href='Documentrequest.html'">

                <button class="Document" type="submit" onclick="window.location.href='Documentrequest.html'"><image class="picture-document" src="photos/Document.png"></image></button>
                <h3 class="Document-word">Document Requests</h3>

            </div>


            <div class="blotter-container">

                <button class="Blotter" type="submit"><image class="picture-blotter" src="photos/Blotter.png"></image></button>
                <h3 class="Blotter-word">Blotter Dashboard</h3>
            </div>


            <div>

                <button class="Profile" type="submit"><image class="picture-profile" src="photos/ProfilePicture.png"></image></button>
                <hr class="sidebar-divider">
                <button class="Logout" type="submit" onclick="window.location.href='Login.html'"><image class="picture-logout" src="photos/Logout.png"></image></button>

            </div>

            </div>

        </nav>

        <nav class="upbar-container">

            <h1 class="home-title">Blotter Requests</h1>
            
            

        </nav>


        <section class="progress-container">

            <div class="total">

                <label class="total-word">Total</label>


            </div>


            
            <div class="processing">

                <label class="processing-word">Processing</label>

            </div>



            <div class="pending">

                <label class="pending-word">Pending</label>

            </div>



            <div class="ready">

                <label class="ready-word">Ready</label>

            </div>


        </section>

        <section class="database">

            <div class="container-bar">

                <div class="search-wrapper">

                    <div class="search-group">

                        <i class="fas fa-search search-icon"></i>
                        <input type="text" placeholder="Search records" class="search-input">
                    
                    </div>
                    


                    <div class="filter-group">

                        <select class="filter-select">

                            <option value="">Filter By</option>
                            <option value="date">Date</option>

                            <optgroup label="Status">
                                <option value="Total">Total</option>
                                <option value="Processing">Processing</option>
                                <option value="Pending">Pending</option>
                                <option value="Ready">Ready</option>

                            </optgroup>
                        </select>


                        <button class="btn-display">Display All</button>
                        <button class="btn-new" onclick="window.location.href='residentform.html'">+ New Request</button>
                        <button class="btn-print">Print</button>


                    </div>


                </div>


            </div>



        </section>


        





        




    </body>

</html>
